name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]

      - name: Install Node deps
        run: npm install

      - name: Typecheck
        run: npm run tsc

      - name: Frontend unit tests
        run: npm run vitest

      - name: Python tests
        run: pytest -q

      - name: Playwright tests
        run: npm run playwright -- --reporter=list
